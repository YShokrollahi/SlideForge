<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>VitaminPScope Presentation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
    }

    .slide-container {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="slide-container">

    <!-- Top Accent Bars -->
    <div data-object="true" data-object-type="shape"
         style="position:absolute; left:0px; top:0px; width:1280px; height:12px; background-color:#2563eb; z-index:1;"></div>
    <div data-object="true" data-object-type="shape"
         style="position:absolute; left:0px; top:12px; width:1280px; height:4px; background-color:#475569; z-index:1;"></div>

    <!-- Right Side Panel -->
    <div data-object="true" data-object-type="shape"
         style="position:absolute; left:1098px; top:0px; width:182px; height:720px; background-color:#f8fafc; border-left:1px solid #e2e8f0; z-index:1;"></div>

    <!-- Main Title -->
    <div data-object="true" data-object-type="textbox"
         style="position:absolute; left:78px; top:92px; width:900px; z-index:10;">
      <p style="margin:0; font-size:54px; font-weight:800; color:#0f172a; line-height:1.12; letter-spacing:-1.2px;">
        VitaminPScope: Scalable Whole-Slide AI Inference and Interactive Pathology Analysis Platform
      </p>
    </div>

    <!-- Blue Divider -->
    <div data-object="true" data-object-type="shape"
         style="position:absolute; left:80px; top:345px; width:98px; height:6px; background-color:#2563eb; z-index:2; border-radius:3px;"></div>

    <!-- Subtitle / Metadata -->
    <div data-object="true" data-object-type="textbox"
         style="position:absolute; left:80px; top:385px; width:760px; z-index:10;">
      <p style="margin:0 0 14px 0; font-size:28px; font-weight:600; color:#1e293b; line-height:1.25;">
        Lab Meeting
      </p>
      <p style="margin:0 0 8px 0; font-size:22px; font-weight:400; color:#475569; line-height:1.35;">
        Presenter: Yasin Shokrollahi
      </p>
      <p style="margin:0; font-size:20px; font-weight:400; color:#64748b; line-height:1.35;">
        Date: 2026-04-08
      </p>
    </div>

    <!-- Right Panel Icons -->
    <div data-object="true" data-object-type="icon"
         style="position:absolute; left:1164px; top:215px; width:52px; height:52px; z-index:10; display:flex; justify-content:center; align-items:center; background-color:#eff6ff; border-radius:26px;">
      <i class="fa-solid fa-desktop" style="font-size:23px; color:#2563eb;"></i>
    </div>

    <div data-object="true" data-object-type="textbox"
         style="position:absolute; left:1110px; top:278px; width:160px; z-index:10; text-align:center;">
      <p style="margin:0; font-size:15px; font-weight:600; color:#475569; line-height:1.2;">Frontend</p>
    </div>

    <div data-object="true" data-object-type="icon"
         style="position:absolute; left:1164px; top:345px; width:52px; height:52px; z-index:10; display:flex; justify-content:center; align-items:center; background-color:#f1f5f9; border-radius:26px;">
      <i class="fa-solid fa-server" style="font-size:23px; color:#475569;"></i>
    </div>

    <div data-object="true" data-object-type="textbox"
         style="position:absolute; left:1110px; top:408px; width:160px; z-index:10; text-align:center;">
      <p style="margin:0; font-size:15px; font-weight:600; color:#475569; line-height:1.2;">Backend</p>
    </div>

    <div data-object="true" data-object-type="icon"
         style="position:absolute; left:1164px; top:475px; width:52px; height:52px; z-index:10; display:flex; justify-content:center; align-items:center; background-color:#f3e8ff; border-radius:26px;">
      <i class="fa-solid fa-brain" style="font-size:23px; color:#7c3aed;"></i>
    </div>

    <div data-object="true" data-object-type="textbox"
         style="position:absolute; left:1110px; top:538px; width:160px; z-index:10; text-align:center;">
      <p style="margin:0; font-size:15px; font-weight:600; color:#475569; line-height:1.2;">AI Service</p>
    </div>

    <!-- Bottom Left Decorative Bars -->
    <div style="position:absolute; left:80px; top:610px; width:210px; height:78px; z-index:3; display:flex; align-items:flex-end; gap:6px;">
      <div style="width:16px; height:18px; background-color:#e2e8f0; border-radius:2px;"></div>
      <div style="width:16px; height:34px; background-color:#cbd5e1; border-radius:2px;"></div>
      <div style="width:16px; height:24px; background-color:#dbeafe; border-radius:2px;"></div>
      <div style="width:16px; height:50px; background-color:#94a3b8; border-radius:2px;"></div>
      <div style="width:16px; height:66px; background-color:#64748b; border-radius:2px;"></div>
      <div style="width:16px; height:30px; background-color:#cbd5e1; border-radius:2px;"></div>
      <div style="width:16px; height:82px; background-color:#60a5fa; border-radius:2px;"></div>
      <div style="width:16px; height:88px; background-color:#2563eb; border-radius:2px;"></div>
    </div>

  </div>
</body>
</html>
